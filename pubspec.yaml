name: safeher
description: Women Safety App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core & UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  lottie: ^3.1.2
  badges: ^3.1.2
  animated_text_kit: ^4.2.2
  provider: ^6.0.5
  audioplayers: ^5.2.1
  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1
  firebase_storage: ^13.0.6

  # Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Phone & SMS
  url_launcher: ^6.3.0
  flutter_phone_direct_caller: ^2.2.1

  # Sensors & Notifications
  sensors_plus: ^7.0.0
  vibration: ^3.1.5
  flutter_local_notifications: ^19.5.0
  speech_to_text: ^7.3.0

  # Storage & Files
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Background Services
  flutter_background_service: ^5.1.0

  # Networking & Sharing
  http: ^1.2.1
  connectivity_plus: ^7.0.0
  share_plus: ^12.0.1

  # Audio
  audio_session: ^0.2.2
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
